name: IronLayer CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  schedule:
    # Weekly E2E: Monday 4 AM UTC
    - cron: '0 4 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  UV_VERSION: "0.6"

jobs:
  # ---------------------------------------------------------------------------
  # Lint: ruff (check + format), mypy across all Python packages
  # ---------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Lint with ruff
        run: uv run ruff check core_engine/ ai_engine/ api/ cli/

      - name: Check formatting with ruff
        run: uv run ruff format --check core_engine/ ai_engine/ api/ cli/

      - name: Run mypy (core_engine)
        run: uv run --package ironlayer-core mypy core_engine/

      - name: Run mypy (ai_engine)
        run: uv run --package ai-engine mypy ai_engine/

      - name: Run mypy (api)
        run: uv run --package ironlayer-api mypy api/

      - name: Run mypy (cli)
        run: uv run --package ironlayer mypy cli/

  # ---------------------------------------------------------------------------
  # Test: core engine (unit + integration with Postgres)
  # ---------------------------------------------------------------------------
  test-core:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ironlayer_test
          POSTGRES_USER: ironlayer
          POSTGRES_PASSWORD: ironlayer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run unit tests
        run: uv run --package ironlayer-core pytest core_engine/tests/unit/ -v --cov=core_engine --cov-report=term-missing --cov-fail-under=70

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql+asyncpg://ironlayer:ironlayer_test@localhost:5432/ironlayer_test
        run: uv run --package ironlayer-core pytest core_engine/tests/integration/ -v

  # ---------------------------------------------------------------------------
  # Test: AI engine
  # ---------------------------------------------------------------------------
  test-ai:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run tests
        run: uv run --package ai-engine pytest ai_engine/tests/ -v --cov=ai_engine --cov-report=term-missing --cov-fail-under=75

  # ---------------------------------------------------------------------------
  # Test: API
  # ---------------------------------------------------------------------------
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run tests
        run: uv run --package ironlayer-api pytest api/tests/ -v --cov=api --cov-report=term-missing --cov-fail-under=75

  # ---------------------------------------------------------------------------
  # Test: CLI
  # ---------------------------------------------------------------------------
  test-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run tests
        run: uv run --package ironlayer pytest cli/tests/ -v --cov=cli --cov-report=term-missing --cov-fail-under=60

  # ---------------------------------------------------------------------------
  # Test: Frontend (lint, typecheck, unit tests)
  # ---------------------------------------------------------------------------
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Audit npm dependencies
        run: cd frontend && npm audit --audit-level=high

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Run tests with coverage
        run: cd frontend && npx vitest run --coverage

      - name: Check coverage threshold
        run: |
          cd frontend
          COVERAGE=$(node -e "
            const report = require('./coverage/coverage-summary.json');
            const pct = report.total.lines.pct;
            console.log(pct);
          ")
          echo "Line coverage: ${COVERAGE}%"
          node -e "if (${COVERAGE} < 20) { console.error('Coverage ${COVERAGE}% is below 20% threshold'); process.exit(1); }"

  # ---------------------------------------------------------------------------
  # Planner determinism gate -- core platform invariant
  # Same inputs MUST produce identical plan JSON (no timestamps, sorted
  # keys, content-based IDs).
  # ---------------------------------------------------------------------------
  planner-determinism:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run planner determinism tests
        run: |
          uv run --package ironlayer-core pytest \
            core_engine/tests/unit/test_interval_planner.py::TestDeterminism \
            core_engine/tests/unit/test_plan_serializer.py::TestSerializePlan::test_deterministic_output \
            core_engine/tests/unit/test_plan_serializer.py::TestSerializePlan::test_keys_are_sorted \
            core_engine/tests/integration/test_planner_determinism.py \
            -v --tb=short

  # ---------------------------------------------------------------------------
  # Test: E2E full pipeline (weekly schedule + release tags only)
  # ---------------------------------------------------------------------------
  test-e2e:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v')
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ironlayer_e2e
          POSTGRES_USER: ironlayer
          POSTGRES_PASSWORD: ironlayer_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run E2E tests
        env:
          DATABASE_URL: postgresql+asyncpg://ironlayer:ironlayer_e2e@localhost:5432/ironlayer_e2e
        run: uv run --package ironlayer-core pytest core_engine/tests/e2e/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Test: Root integration tests (failure recovery, cross-package)
  # ---------------------------------------------------------------------------
  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run integration tests
        run: uv run --package ironlayer-api pytest tests/integration/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Validate Alembic migrations (BL-027)
  # Runs upgrade head → downgrade -1 → upgrade head against a clean Postgres.
  # Ensures every migration is reversible and idempotent before any build.
  # ---------------------------------------------------------------------------
  validate-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ironlayer_migrate_test
          POSTGRES_USER: ironlayer
          POSTGRES_PASSWORD: ironlayer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Upgrade to head
        env:
          ALEMBIC_DATABASE_URL: postgresql://ironlayer:ironlayer_test@localhost:5432/ironlayer_migrate_test
        run: uv run --package ironlayer-core python -m alembic -c core_engine/state/migrations/alembic.ini upgrade head

      - name: Downgrade one revision
        env:
          ALEMBIC_DATABASE_URL: postgresql://ironlayer:ironlayer_test@localhost:5432/ironlayer_migrate_test
        run: uv run --package ironlayer-core python -m alembic -c core_engine/state/migrations/alembic.ini downgrade -1

      - name: Re-upgrade to head (idempotency check)
        env:
          ALEMBIC_DATABASE_URL: postgresql://ironlayer:ironlayer_test@localhost:5432/ironlayer_migrate_test
        run: uv run --package ironlayer-core python -m alembic -c core_engine/state/migrations/alembic.ini upgrade head

  # ---------------------------------------------------------------------------
  # Rust check_engine: cargo test + clippy + maturin build verification
  # Ensures the PyO3 extension compiles and all 647 Rust tests pass.
  # ---------------------------------------------------------------------------
  test-check-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.75.0"
          components: clippy

      - name: Cache Rust build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            check_engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('check_engine/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run cargo tests
        working-directory: check_engine
        run: cargo test --all --release

      - name: Run cargo clippy (deny warnings)
        working-directory: check_engine
        run: cargo clippy -- -D warnings

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install maturin
        run: uv pip install "maturin>=1.4,<2.0"

      - name: Build PyO3 extension (verify it compiles)
        working-directory: check_engine
        run: maturin build --release

  # ---------------------------------------------------------------------------
  # Security scanning (pip-audit, Trivy, Bandit)
  # ---------------------------------------------------------------------------
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Install pip-audit
        run: uv pip install pip-audit

      - name: Scan core_engine dependencies
        run: uv run pip-audit --desc

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Install bandit
        run: uv pip install bandit[toml]

      - name: Run bandit security scan
        run: uv run bandit -r core_engine/core_engine api/api ai_engine/ai_engine -c pyproject.toml -f json -o bandit-report.json --severity-level medium || true

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Check bandit (fail on high severity)
        run: uv run bandit -r core_engine/core_engine api/api ai_engine/ai_engine -c pyproject.toml --severity-level high

  # ---------------------------------------------------------------------------
  # Build & push Docker images to Azure Container Registry
  # Requires ALL gates: lint, tests, determinism, security
  # ---------------------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, test-core, test-ai, test-api, test-cli, test-frontend, test-integration, test-e2e, planner-determinism, security-scan, validate-migrations, test-check-engine]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}

    strategy:
      matrix:
        include:
          - image: ironlayer-api
            dockerfile: infra/docker/Dockerfile.api
            context: .
          - image: ironlayer-ai
            dockerfile: infra/docker/Dockerfile.ai
            context: .
          - image: ironlayer-frontend
            dockerfile: infra/docker/Dockerfile.frontend
            context: .

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name "${{ env.ACR_LOGIN_SERVER }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          # BL-130: include uv.lock hash so cache busts when deps change.
          key: ${{ runner.os }}-buildx-${{ matrix.image }}-${{ hashFiles('uv.lock') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.image }}-${{ hashFiles('uv.lock') }}-
            ${{ runner.os }}-buildx-${{ matrix.image }}-

      - name: Determine image tags
        id: tags
        run: |
          TAGS="${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image }}:sha-${GITHUB_SHA::8}"
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TAGS="${TAGS},${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image }}:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS},${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image }}:${VERSION}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64
          # BL-133: SLSA provenance + in-image SBOM via Docker Buildx attestations.
          provenance: mode=max
          sbom: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_REF=${{ github.ref }}
            VITE_API_URL=${{ vars.API_URL || 'https://api.ironlayer.app' }}

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # BL-131: Sign images with Cosign (keyless, Sigstore Rekor transparency log).
      # Requires id-token: write permission (already set on this job).
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless)
        run: |
          IMAGE="${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}"
          cosign sign --yes "${IMAGE}"

      # BL-132: Generate CycloneDX SBOM during build (not just at publish).
      # Uploads as a workflow artifact so it is available for audit before release.
      - name: Set up uv (for SBOM generation)
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Generate SBOM
        run: |
          uv tool install cyclonedx-bom
          uv tool run cyclonedx-py environment \
            --output-format JSON \
            --outfile "sbom-${{ matrix.image }}-${{ github.sha }}.json"
          uv tool run cyclonedx validate \
            --input-format JSON \
            --input-file "sbom-${{ matrix.image }}-${{ github.sha }}.json"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}-${{ github.sha }}
          path: sbom-${{ matrix.image }}-${{ github.sha }}.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Trivy container image scan (BL-023)
  # Scans each built Docker image for CRITICAL/HIGH CVEs before deploy.
  # Runs only on main/tags (same condition as build-and-push).
  # ---------------------------------------------------------------------------
  trivy-image-scan:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}

    strategy:
      matrix:
        image: [ironlayer-api, ironlayer-ai, ironlayer-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name "${{ env.ACR_LOGIN_SERVER }}"

      - name: Pull image
        run: docker pull "${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image }}:sha-${GITHUB_SHA::8}"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: "${{ env.ACR_LOGIN_SERVER }}/${{ matrix.image }}:sha-${GITHUB_SHA::8}"
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

  # ---------------------------------------------------------------------------
  # Deploy to Azure Container Apps (release tags only)
  # ---------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, trivy-image-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    env:
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Run database migrations
        run: |
          az containerapp job update \
            --name ${{ vars.APP_PREFIX }}-migrate \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image "${{ env.ACR_LOGIN_SERVER }}/ironlayer-api:${{ steps.version.outputs.tag }}" \
            --output none
          az containerapp job start \
            --name ${{ vars.APP_PREFIX }}-migrate \
            --resource-group ${{ env.RESOURCE_GROUP }}

      # Canary deploys — each call to canary_deploy.sh:
      #   1. Enables multiple-revision mode (idempotent)
      #   2. Records the current active revision
      #   3. Deploys the new revision at 0% traffic
      #   4. Waits for the new revision to reach Running state (up to 3 min)
      #   5. Smoke-tests the canary directly via its revision FQDN
      #   6. Shifts traffic progressively: 10% → 50% → 100% (1 min between shifts)
      #   7. On any failure: restores 100% traffic to old revision and exits 1.
      # Revision suffix uses the tag with dots → dashes (Azure CA name constraint).

      - name: Deploy API (canary)
        run: |
          SUFFIX="v$(echo '${{ steps.version.outputs.tag }}' | tr '.' '-')"
          bash infra/scripts/canary_deploy.sh \
            "${{ vars.APP_PREFIX }}-api" \
            "${{ env.ACR_LOGIN_SERVER }}/ironlayer-api:${{ steps.version.outputs.tag }}" \
            "/api/v1/health" \
            "$SUFFIX"

      - name: Deploy AI Engine (canary)
        run: |
          SUFFIX="v$(echo '${{ steps.version.outputs.tag }}' | tr '.' '-')"
          bash infra/scripts/canary_deploy.sh \
            "${{ vars.APP_PREFIX }}-ai" \
            "${{ env.ACR_LOGIN_SERVER }}/ironlayer-ai:${{ steps.version.outputs.tag }}" \
            "/health" \
            "$SUFFIX"

      - name: Deploy Frontend (canary)
        run: |
          SUFFIX="v$(echo '${{ steps.version.outputs.tag }}' | tr '.' '-')"
          bash infra/scripts/canary_deploy.sh \
            "${{ vars.APP_PREFIX }}-frontend" \
            "${{ env.ACR_LOGIN_SERVER }}/ironlayer-frontend:${{ steps.version.outputs.tag }}" \
            "/" \
            "$SUFFIX"

  # ---------------------------------------------------------------------------
  # Publish CLI wheel + OpenAPI spec (release tags only)
  # ---------------------------------------------------------------------------
  publish:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Build CLI wheel
        run: cd cli && uv build

      - name: Install API dependencies
        run: uv sync --all-packages

      - name: Export OpenAPI spec
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          cd api
          uv run --package ironlayer-api python -c "
          import json
          from api.main import app
          spec = app.openapi()
          with open('openapi.json', 'w') as f:
              json.dump(spec, f, indent=2)
          "

      - name: Generate SBOM
        # Install cyclonedx-bom as an isolated uv tool (not into the workspace
        # venv) so the tool itself does not appear in the SBOM it generates.
        run: |
          uv tool install cyclonedx-bom
          cyclonedx-py environment --output-format JSON --outfile sbom.json

      - name: Validate SBOM
        run: uv tool run cyclonedx validate --input-format JSON --input-file sbom.json

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: IronLayer ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            cli/dist/*.whl
            cli/dist/*.tar.gz
            api/openapi.json
            sbom.json

  # ---------------------------------------------------------------------------
  # E2E: Playwright critical-path tests (BL-157)
  # Runs on: schedule (weekly), workflow_dispatch, or when tagged.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Start API server (background)
        env:
          PLATFORM_ENV: development
          JWT_SECRET: e2e-test-secret-for-ci-only-change-in-prod
          PYTHONPATH: ${{ github.workspace }}
        run: |
          uv run --package ironlayer-api uvicorn api.main:app --host 0.0.0.0 --port 8000 &
          echo "API_PID=$!" >> "$GITHUB_ENV"

      - name: Build and start frontend (background)
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000
        run: |
          npm run build
          npx vite preview --port 3000 &
          echo "FRONTEND_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for services to be ready
        run: |
          echo "Waiting for API..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health && break
            sleep 2
          done
          echo "Waiting for frontend..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/ && break
            sleep 2
          done

      - name: Run Playwright E2E tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:8000
        run: npx playwright test --reporter=github

      - name: Upload Playwright test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
