services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ironlayer
      POSTGRES_USER: ironlayer
      POSTGRES_PASSWORD: ironlayer_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironlayer"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      API_DATABASE_URL: postgresql+asyncpg://ironlayer:ironlayer_dev@postgres:5432/ironlayer
      API_AI_ENGINE_URL: http://ai_service:8001
      API_PLATFORM_ENV: dev
      AI_ENGINE_SHARED_SECRET: ${AI_ENGINE_SHARED_SECRET:-change-me-in-production}
      REDIS_URL: redis://redis:6379/0
      # Auth — stable dev secrets so tokens survive container restarts.
      # Override with real secrets in .env for staging/prod.
      AUTH_MODE: ${AUTH_MODE:-development}
      JWT_SECRET: ${JWT_SECRET:-dev-change-me-not-for-production}
      API_CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-dev-change-me-not-for-production}
      # Metrics endpoint auth token (BL-116). Set a strong random value in .env.
      # Prometheus reads the same value from infra/prometheus/metrics_token.
      API_METRICS_TOKEN: ${API_METRICS_TOKEN:-dev-metrics-token}
      # Repos: allow access to local projects mounted at /workspace.
      API_ALLOWED_REPO_BASE: /workspace
    volumes:
      # Mount host /tmp so local test projects (e.g. /tmp/ironlayer-test) are
      # accessible inside the container at /workspace/<project-name>.
      - /tmp:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai_service:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.ai
    ports:
      - "8001:8001"
    environment:
      LLM_ENABLED: "false"
      AI_ENGINE_PORT: "8001"
      AI_ENGINE_SHARED_SECRET: ${AI_ENGINE_SHARED_SECRET:-change-me-in-production}
      AI_ENGINE_ALLOWED_ORIGINS: ${AI_ENGINE_ALLOWED_ORIGINS:-http://localhost:8000}
      PLATFORM_ENV: ${PLATFORM_ENV:-dev}

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "3002:3000"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api

  # BL-134: Prometheus Pushgateway — receives check engine metrics pushed after
  # each validation run. Exposes them for Prometheus to scrape.
  pushgateway:
    image: prom/pushgateway:v1.9.0
    ports:
      - "9091:9091"

  # BL-135: PostgreSQL exporter — exposes pg_up, connection pool, disk metrics.
  # Required for DatabaseDown and DatabaseDiskFull alerting rules to fire.
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://ironlayer:ironlayer_dev@postgres:5432/ironlayer?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/metrics_token:/etc/prometheus/metrics_token:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - api
      - pushgateway
      - postgres_exporter

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ironlayer
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  redis_data:
  postgres_data:
  prometheus_data:
  grafana_data:
