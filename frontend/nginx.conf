server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # BL-121: 'unsafe-inline' removed from style-src.
    # Vite's production build emits all CSS as external content-hashed .css files
    # (e.g. app.a1b2c3d4.css) — no inline <style> tags are generated.
    # style-src-elem restricts inline <style> elements; style-src-attr restricts
    # style="" attributes. Both are 'self' only.
    # Security headers — applied to all responses (re-applied in nested blocks below).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; style-src-elem 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # BL-115: gzip compression — reduces asset sizes 60-80% for text-based assets.
    # gzip_vary ensures CDN/proxy caches store separate gzip and plain variants.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff2;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # BL-115: Long-lived immutable cache for Vite content-hashed assets.
    # Vite produces filenames like app.a1b2c3d4.js — the hash changes on every
    # content change, so these files are safe to cache for 1 year with `immutable`.
    # Security headers are re-declared because Nginx `add_header` does not inherit
    # from parent blocks when a nested block also uses `add_header`.
    location ~* \.(js|css|woff2|woff|ttf|ico|png|jpg|jpeg|svg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Re-apply security headers (required — parent add_header is shadowed here).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; style-src-elem 'self'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }

    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
