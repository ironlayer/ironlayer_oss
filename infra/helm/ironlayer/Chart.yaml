apiVersion: v2
name: ironlayer
description: >-
  IronLayer -- Databricks SQL transformation orchestration platform.
  Deploys the API control plane, AI advisory engine, React frontend,
  and a PostgreSQL system-of-record database.
type: application
version: 0.1.0
appVersion: "0.1.0"

keywords:
  - databricks
  - sql
  - orchestration
  - transformation
  - lineage

home: https://github.com/your-org/ironlayer
maintainers:
  - name: IronLayer Team

dependencies:
  # Bitnami PostgreSQL subchart -- BL-152: pinned to a specific patch version
  # to prevent unexpected upgrades.  Run `helm dependency update` after any
  # version change to refresh Chart.lock.
  - name: postgresql
    version: "15.5.38"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
