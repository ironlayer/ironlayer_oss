# ============================================================================
# IronLayer Helm Chart -- Default Values
# ============================================================================
# Override these values per environment using -f <env>.yaml or --set flags.

# ---------------------------------------------------------------------------
# Global settings shared across all sub-charts and templates.
# ---------------------------------------------------------------------------
global:
  # Container registry prefix applied to every image reference.
  imageRegistry: ""
  # Pull secrets available to all pods (list of secret names).
  imagePullSecrets: []
  #   - name: my-registry-secret

# ---------------------------------------------------------------------------
# API -- FastAPI control plane (port 8000)
# ---------------------------------------------------------------------------
api:
  replicaCount: 2

  image:
    repository: ironlayer/api
    tag: ""  # Defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  # -- Uvicorn / FastAPI runtime settings
  host: "0.0.0.0"
  port: 8000
  debug: "false"

  platformEnv: production
  structuredLogging: "true"

  # -- CORS
  corsOrigins: '["https://ironlayer.example.com"]'

  # -- Rate limiting
  rateLimitEnabled: "true"
  rateLimitRequestsPerMinute: "60"
  rateLimitBurstMultiplier: "1.5"
  rateLimitAuthEndpointsPerMinute: "20"

  # -- Token management
  tokenRevocationEnabled: "true"

  # -- Auth
  authMode: jwt
  jwtAlgorithm: HS256

  # -- Kubernetes resource constraints
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # -- Probes
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /ready
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # -- Startup probe — gates liveness/readiness until the app has fully initialised.
  # BL-147: failureThreshold × periodSeconds = 30 × 10s = 5-minute startup window.
  startupProbe:
    httpGet:
      path: /api/v1/health
      port: http
    failureThreshold: 30
    periodSeconds: 10

  # -- Pod scheduling constraints
  nodeSelector: {}
  tolerations: []
  # BL-146: Prefer spreading replicas across nodes (soft anti-affinity).
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: ironlayer-api
            topologyKey: kubernetes.io/hostname
  podAnnotations: {}
  podLabels: {}

  # -- Service account (uses shared serviceAccount section below)
  serviceAccount:
    # Set to override the shared service account for this workload.
    nameOverride: ""

  # -- Init container: Alembic migrations
  migrations:
    enabled: true
    # Extra flags forwarded to `alembic upgrade head`.
    extraArgs: []

# ---------------------------------------------------------------------------
# AI Engine -- advisory service (port 8001)
# ---------------------------------------------------------------------------
aiEngine:
  replicaCount: 1

  image:
    repository: ironlayer/ai-engine
    tag: ""  # Defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  port: 8001

  # -- LLM integration
  llmEnabled: "false"
  llmProvider: anthropic
  llmModel: claude-sonnet-4-20250514
  llmTimeout: "30"
  llmMaxTokens: "4096"

  # -- Scoring / classification thresholds
  costModelPath: /app/ai_engine/ai_engine/models/cost_model.json
  riskThresholdHigh: "0.8"
  riskThresholdMedium: "0.5"
  semanticSimilarityThreshold: "0.85"

  # -- Kubernetes resource constraints
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # -- Probes
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /readiness  # returns 503 until CostPredictor is warm (BL-100); separate from liveness
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # BL-147: Startup probe — use /readiness (waits for model warm-up).
  startupProbe:
    httpGet:
      path: /readiness
      port: http
    failureThreshold: 30
    periodSeconds: 10

  # -- Pod scheduling constraints
  nodeSelector: {}
  tolerations: []
  # BL-146: Soft anti-affinity to spread AI engine replicas across nodes.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: ironlayer-ai-engine
            topologyKey: kubernetes.io/hostname
  podAnnotations: {}
  podLabels: {}

  serviceAccount:
    nameOverride: ""

# ---------------------------------------------------------------------------
# Frontend -- React SPA served by Nginx (port 3000)
# ---------------------------------------------------------------------------
frontend:
  replicaCount: 2

  image:
    repository: ironlayer/frontend
    tag: ""  # Defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent

  port: 3000

  # -- Kubernetes resource constraints
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  # -- Probes
  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

  # BL-147: Startup probe for frontend (nginx can be slow on first start).
  startupProbe:
    httpGet:
      path: /
      port: http
    failureThreshold: 30
    periodSeconds: 10

  # -- Pod scheduling constraints
  nodeSelector: {}
  tolerations: []
  # BL-146: Soft anti-affinity to spread frontend replicas across nodes.
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: ironlayer-frontend
            topologyKey: kubernetes.io/hostname
  podAnnotations: {}
  podLabels: {}

  serviceAccount:
    nameOverride: ""

# ---------------------------------------------------------------------------
# PostgreSQL -- Bitnami subchart configuration
# ---------------------------------------------------------------------------
postgresql:
  enabled: true

  auth:
    username: ironlayer
    password: ""  # Set via --set or a secret in production
    database: ironlayer
    existingSecret: ""

  primary:
    persistence:
      enabled: true
      size: 20Gi
      storageClass: ""

    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  # Metrics sidecar (optional -- enable for Prometheus scraping)
  metrics:
    enabled: false

# ---------------------------------------------------------------------------
# Secrets -- sensitive values injected as a Kubernetes Secret.
# In production prefer an external secret operator; these defaults are for
# initial bootstrapping only.
# ---------------------------------------------------------------------------
secrets:
  # Full asyncpg connection string.
  databaseUrl: "postgresql+asyncpg://ironlayer:changeme@ironlayer-postgresql:5432/ironlayer"

  # JWT signing secret -- MUST be overridden in production.
  jwtSecret: "changeme-generate-a-real-secret"

  # Optional: Anthropic (or other) LLM provider key. Leave empty to disable.
  llmApiKey: ""

# ---------------------------------------------------------------------------
# Ingress -- Expose the frontend and API through an Ingress controller.
# ---------------------------------------------------------------------------
ingress:
  enabled: false

  className: nginx

  annotations: {}
  #   cert-manager.io/cluster-issuer: letsencrypt-prod
  #   nginx.ingress.kubernetes.io/proxy-body-size: "10m"

  hosts:
    - host: ironlayer.example.com
      paths:
        - path: /
          pathType: Prefix
          backend: frontend
        - path: /api/
          pathType: Prefix
          backend: api

  tls: []
  #   - secretName: ironlayer-tls
  #     hosts:
  #       - ironlayer.example.com

# ---------------------------------------------------------------------------
# Horizontal Pod Autoscaler -- optional auto-scaling for API and AI Engine.
# ---------------------------------------------------------------------------
autoscaling:
  enabled: false

  api:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

  aiEngine:
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

# ---------------------------------------------------------------------------
# mTLS -- Mutual TLS between services via service mesh.
# ---------------------------------------------------------------------------
# IronLayer supports annotation-based mTLS configuration for both Istio and
# Linkerd service meshes.  Enable this section and set your provider to inject
# sidecar proxies with automatic mTLS between API ↔ AI Engine ↔ PostgreSQL.
mtls:
  # BL-151: PRODUCTION DEPLOYMENTS MUST SET enabled: true.
  # Without mTLS, all inter-service traffic (API ↔ AI Engine ↔ PostgreSQL)
  # is unencrypted inside the cluster — a serious security risk in shared
  # environments.  Set enabled: true and configure your service mesh below.
  enabled: false

  # Service mesh provider: "istio" or "linkerd"
  provider: istio

  # Istio-specific: PeerAuthentication mode (STRICT = enforce mTLS)
  istio:
    mode: STRICT

  # Linkerd-specific: auto-inject annotation
  linkerd:
    proxyInjectMode: enabled

  # cert-manager integration for certificate issuance (Istio only).
  certManager:
    enabled: false
    issuerRef:
      name: ironlayer-ca-issuer
      kind: ClusterIssuer

# ---------------------------------------------------------------------------
# PodDisruptionBudgets (BL-109) — prevent simultaneous eviction of all pods.
# ---------------------------------------------------------------------------
# PDBs are only created for workloads with replicaCount > 1, so single-replica
# test environments are unaffected.  Set enabled=false to disable globally.
pdb:
  enabled: true

# ---------------------------------------------------------------------------
# NetworkPolicies (BL-110) — enforce least-privilege pod communication.
# ---------------------------------------------------------------------------
# Default-deny baseline + per-workload allow rules (see networkpolicy.yaml).
# Set ingressNamespace to match your ingress controller's namespace.
networkPolicy:
  enabled: true
  ingressNamespace: ingress-nginx  # Override for Traefik, Contour, etc.
  # BL-149: Namespace where Prometheus is running (for metrics scrape ingress rules).
  monitoringNamespace: monitoring

# ---------------------------------------------------------------------------
# ResourceQuota (BL-150) — namespace-level resource caps.
# Disabled by default; enable in production to prevent runaway resource usage.
# ---------------------------------------------------------------------------
resourceQuota:
  enabled: false
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "50"

# ---------------------------------------------------------------------------
# Service Account -- shared across workloads unless overridden per-service.
# ---------------------------------------------------------------------------
# ---------------------------------------------------------------------------
# Secret Rotation CronJob (BL-155) — monthly JWT secret rotation.
# Disabled by default.  See templates/secret-rotation-job.yaml for details.
# ---------------------------------------------------------------------------
secretRotation:
  enabled: false
  # Azure Key Vault name that holds JWT-SECRET and JWT-SECRET-PREVIOUS.
  keyVaultName: ""
  # Kubernetes Deployment name (or Azure Container App name) for the API.
  apiAppName: ""

# ---------------------------------------------------------------------------
# Service Account -- shared across workloads unless overridden per-service.
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}
  #   eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/ironlayer
  automountServiceAccountToken: false
