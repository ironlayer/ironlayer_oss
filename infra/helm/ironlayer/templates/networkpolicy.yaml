{{/*
============================================================================
NetworkPolicies (BL-110)
============================================================================
Enforces the principle of least privilege for pod-to-pod communication.
Without NetworkPolicies, any pod in the cluster can communicate with any
other pod — including reaching the database directly from the frontend.

Policy model (all ingress, default-deny baseline):
  - API:         allowed from ingress controller
  - AI Engine:   allowed from API pods only (port 8001)
  - Frontend:    allowed from ingress controller (port 3000)

Egress is not restricted here; apply an egress default-deny separately
if your cluster requires it (e.g. for strict PCI/HIPAA compliance).

Enabled by default (networkPolicy.enabled=true in values.yaml).
Override networkPolicy.ingressNamespace to match your ingress controller's
namespace (default: ingress-nginx).
*/}}

{{- if .Values.networkPolicy.enabled }}
---
# Default: deny all ingress to pods in this release's label scope.
# Individual workload policies below open only the required ports.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ironlayer.fullname" . }}-default-deny
  labels:
    {{- include "ironlayer.labels" . | nindent 4 }}
spec:
  # Apply to all pods that carry the ironlayer instance label.
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  # No ingress rules = deny all ingress to matched pods.
  ingress: []
---
# API: allow ingress from the ingress controller namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ironlayer.api.fullname" . }}-ingress
  labels:
    {{- include "ironlayer.api.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ironlayer.api.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - protocol: TCP
          port: {{ .Values.api.port }}
---
# AI Engine: allow ingress from API pods only (internal service-to-service).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ironlayer.ai.fullname" . }}-ingress
  labels:
    {{- include "ironlayer.ai.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ironlayer.ai.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "ironlayer.api.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.aiEngine.port }}
---
# Frontend: allow ingress from the ingress controller namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ironlayer.frontend.fullname" . }}-ingress
  labels:
    {{- include "ironlayer.frontend.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ironlayer.frontend.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace | default "ingress-nginx" }}
      ports:
        - protocol: TCP
          port: {{ .Values.frontend.port }}
{{- end }}
