{{/*
============================================================================
Secret Rotation CronJob (BL-155) — Monthly JWT secret rotation scaffold
============================================================================
This template creates an optional CronJob that rotates the JWT signing
secret on a monthly schedule.

DISABLED BY DEFAULT (secretRotation.enabled=false).  Enable only after:
  1. Granting the job's service account Key Vault Secrets Officer role.
  2. Granting it the Container Apps Contributor role (for rolling restart).
  3. Configuring Workload Identity on the cluster to inject credentials.

Rotation strategy (zero-downtime):
  1. Read current JWT_SECRET from Key Vault.
  2. Write current value to JWT_SECRET_PREVIOUS (grace-period fallback).
  3. Generate a new 64-character random JWT_SECRET.
  4. Write the new value to Key Vault as JWT_SECRET.
  5. Trigger a rolling restart of the API deployment so pods pick up the
     new secret.  During the restart window both secrets are valid because
     the API checks JWT_SECRET_PREVIOUS on validation failure.

Required values:
  secretRotation.enabled     — set to true to activate
  secretRotation.keyVaultName — Azure Key Vault name
  secretRotation.apiAppName   — Container App or Deployment name for API

Required RBAC (documented here, provisioned outside this chart):
  - Key Vault Secrets Officer on the Key Vault
  - Contributor on the Container App (or kubectl patch permission on the Deployment)
*/}}
{{- if .Values.secretRotation.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "ironlayer.fullname" . }}-secret-rotation
  labels:
    {{- include "ironlayer.labels" . | nindent 4 }}
spec:
  # Run on the first day of every month at 02:00 UTC.
  schedule: "0 2 1 * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "ironlayer.labels" . | nindent 12 }}
        spec:
          serviceAccountName: {{ include "ironlayer.serviceAccountName" . }}
          restartPolicy: OnFailure
          containers:
            - name: rotate-secret
              image: mcr.microsoft.com/azure-cli:latest
              imagePullPolicy: IfNotPresent
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              env:
                - name: KEY_VAULT_NAME
                  value: {{ .Values.secretRotation.keyVaultName | quote }}
                - name: API_APP_NAME
                  value: {{ .Values.secretRotation.apiAppName | quote }}
              command:
                - /bin/sh
                - -c
                - |
                  set -euo pipefail
                  echo "=== IronLayer JWT Secret Rotation ==="

                  # 1. Read current secret (becomes the previous-secret fallback).
                  CURRENT=$(az keyvault secret show \
                    --vault-name "$KEY_VAULT_NAME" \
                    --name JWT-SECRET \
                    --query value -o tsv)

                  # 2. Store current as the previous-period fallback.
                  az keyvault secret set \
                    --vault-name "$KEY_VAULT_NAME" \
                    --name JWT-SECRET-PREVIOUS \
                    --value "$CURRENT" \
                    --output none
                  echo "  Stored current secret as JWT-SECRET-PREVIOUS."

                  # 3. Generate a new 64-character cryptographically random secret.
                  NEW=$(openssl rand -base64 48 | tr -d '/+=' | head -c 64)

                  # 4. Write the new secret to Key Vault.
                  az keyvault secret set \
                    --vault-name "$KEY_VAULT_NAME" \
                    --name JWT-SECRET \
                    --value "$NEW" \
                    --output none
                  echo "  New JWT-SECRET stored in Key Vault."

                  # 5. Trigger a rolling restart of the API deployment.
                  #    Kubernetes: kubectl rollout restart deployment
                  #    Azure Container Apps: az containerapp revision copy
                  kubectl rollout restart deployment/"$API_APP_NAME" 2>/dev/null \
                    || echo "  Note: kubectl unavailable; trigger restart manually."

                  echo "=== Rotation complete. Previous secret valid for grace window. ==="
{{- end }}
