global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "ironlayer-api"
    metrics_path: /metrics
    # BL-116: /metrics requires a bearer token when API_METRICS_TOKEN is set.
    # Set the same value here as in the API container's API_METRICS_TOKEN env var.
    # Leave authorization commented out if API_METRICS_TOKEN is unset (open access).
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/metrics_token

    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "api"
          environment: "dev"

  - job_name: "ironlayer-ai-engine"
    metrics_path: /metrics
    static_configs:
      - targets: ["ai_service:8001"]
        labels:
          service: "ai-engine"
          environment: "dev"

  # BL-135: PostgreSQL exporter — exposes pg_up, connection stats, disk metrics.
  # Required for DatabaseDown and DatabaseDiskFull alerting rules to fire.
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]
        labels:
          service: "postgres"
          environment: "dev"

  # BL-134: Prometheus Pushgateway — receives check engine metrics pushed after
  # each validation run. Required for CheckEngineStalled and
  # CheckEngineHighErrorRate alerting rules to have data.
  - job_name: "ironlayer-check-engine"
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
        labels:
          service: "check-engine"
          environment: "dev"
